<div class="container">

    <h1>Minhas Categorias</h1>

    <!-- Button Create -->
    <div class="header-actions">
        <button mat-raised-button class="btn-create" [routerLink]="['create']">
            <mat-icon>add</mat-icon>
            Adicionar Nova Categoria
        </button>
    </div>

    <!-- FILTER -->
    <mat-form-field appearance="outline" class="filter">
        <mat-label>Filtrar Categorias</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex: Comida, Transporte...">
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <!-- ID -->
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let c">{{ c.id }}</td>
        </ng-container>

        <!-- Description -->
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let c">{{ c.name }}</td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let c">

                <button mat-icon-button class="edit" [routerLink]="['edit',c.id]">
                    <mat-icon>edit</mat-icon>
                </button>

                <button mat-icon-button class="delete" (click)="toggleDelete(c.id)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <!-- PAGINATOR -->
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons>
    </mat-paginator>

</div>
