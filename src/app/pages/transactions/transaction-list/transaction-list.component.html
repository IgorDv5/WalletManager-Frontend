<div class="container">

    <h1>Minhas de Transações</h1>

    <!-- Button Create -->
    <div class="header-actions">
        <button mat-raised-button class="btn-create" [routerLink]="['create']">
            <mat-icon>add</mat-icon>
            Adicionar Nova Transação
        </button>
    </div>

    <!-- FILTER -->
    <mat-form-field appearance="outline" class="filter">
        <mat-label>Filtrar transações</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex: salário, mercado...">
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <!-- ID -->
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let t">{{ t.id }}</td>
        </ng-container>

        <!-- Description -->
        <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Descrição</th>
            <td mat-cell *matCellDef="let t">{{ t.description }}</td>
        </ng-container>

        <!-- Amount -->
        <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef>Valor</th>
            <td mat-cell *matCellDef="let t">
                <span [ngClass]="t.type === 'INCOME' ? 'income' : 'expense'">
                    {{ t.amount | currency:'BRL' }}
                </span>
            </td>
        </ng-container>

        <!-- Date -->
        <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Data</th>
            <td mat-cell *matCellDef="let t">
                {{ t.date | date:'dd/MM/yyyy HH:mm' }}
            </td>
        </ng-container>

        <!-- Type -->
        <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Tipo</th>
            <td mat-cell *matCellDef="let t">
                <span [ngClass]="t.type === 'INCOME' ? 'income' : 'expense'">

                    <mat-icon *ngIf="t.type === 'INCOME'">trending_up</mat-icon>
                    <mat-icon *ngIf="t.type === 'EXPENSE'">trending_down</mat-icon>

                    {{ t.type === 'INCOME' ? 'Ganho' : 'Gasto' }}

                </span>
            </td>
        </ng-container>


        <!-- Actions -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let t">

                <button mat-icon-button class="edit" [routerLink]="['edit',t.id]">
                    <mat-icon>edit</mat-icon>
                </button>

                <button mat-icon-button class="delete" (click)="toggleDelete(t.id)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <!-- PAGINATOR -->
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons>
    </mat-paginator>

</div>
