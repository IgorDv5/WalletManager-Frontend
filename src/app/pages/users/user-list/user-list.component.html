<div class="container">

    <h1>Lista de Usuários</h1>

    <!-- Button Create -->
    <div class="header-actions">
        <button mat-raised-button class="btn-create" [routerLink]="['create']">
            <mat-icon>add</mat-icon>
            Adicionar Novo Usuário
        </button>
    </div>

    <!-- FILTER -->
    <mat-form-field appearance="outline" class="filter">
        <mat-label>Filtrar Usuários</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex: João, Felipe...">
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <!-- ID -->
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let u">{{ u.id }}</td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let u">{{ u.nome }}</td>
        </ng-container>

          <!-- Email -->
        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>E-mail</th>
            <td mat-cell *matCellDef="let u">{{ u.email }}</td>
        </ng-container>

           <!-- Role -->
        <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Role</th>
            <td mat-cell *matCellDef="let u">{{ u.role }}</td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let u">

                <button mat-icon-button class="edit" [routerLink]="['edit',u.id]">
                    <mat-icon>edit</mat-icon>
                </button>

                <button mat-icon-button class="delete" (click)="toggleDelete(u.id)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <!-- PAGINATOR -->
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons>
    </mat-paginator>

</div>
